<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Leadfinder - Review</title>
  <link rel="stylesheet" href="/app.css">
  <style>
    body { overflow:auto; height:auto; }
    .rev-progress { padding:12px 20px; border-bottom:1px solid var(--line); display:flex;
                    align-items:center; gap:20px; background:var(--card); }
    .rev-counts { display:flex; gap:18px; font-size:13px; color:var(--muted); }
    .rev-counts strong { color:var(--ink); font-size:15px; font-variant-numeric:tabular-nums; }
    .progress { flex:1; min-width:120px; height:8px; background:var(--line); border-radius:99px; overflow:hidden; }
    .progress-fill { display:block; height:100%; background:var(--accent); width:0; transition:width .2s; }

    .rev-sub { max-width:940px; margin:0 auto; padding:16px 16px 0; display:flex;
               justify-content:space-between; align-items:baseline; gap:12px; }
    .rev-sub .count { font-size:14px; color:var(--ink); font-weight:600; }
    .rev-sub .hint { font-size:12.5px; color:var(--muted); }

    .rev-list { max-width:940px; margin:0 auto; padding:12px 16px 70px;
                display:flex; flex-direction:column; gap:8px; }

    .row { display:flex; align-items:center; gap:14px; background:var(--card);
           border:1px solid var(--line); border-left:3px solid transparent; border-radius:12px;
           padding:11px 14px; box-shadow:var(--shadow); transition:opacity .15s, border-color .15s; }
    .row.keep { border-left-color:var(--good); }
    .row.reject { border-left-color:var(--mid); opacity:.55; }
    .row .info { flex:1; min-width:0; }
    .row .name { font-size:16px; font-weight:700; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
    .row .meta { color:var(--muted); font-size:12.5px; margin-top:3px; line-height:1.5; }
    .row .meta a { color:var(--accent); text-decoration:none; }
    .row .meta a:hover { text-decoration:underline; }
    .row .sep { opacity:.4; margin:0 7px; }
    .chip { font-size:10.5px; text-transform:uppercase; letter-spacing:.5px; padding:2px 7px;
            border-radius:99px; font-weight:700; }
    .chip.keep { background:var(--good-soft); color:var(--good); }
    .chip.reject { background:var(--mid-soft); color:var(--mid); }

    .acts { display:flex; gap:8px; flex:none; }
    .mk { min-width:44px; height:40px; padding:0 10px; border-radius:10px; border:1px solid var(--line);
          background:var(--card); color:var(--muted); font-size:16px; font-weight:700; cursor:pointer;
          display:flex; align-items:center; gap:6px; }
    .mk .lbl { font-size:12px; font-weight:600; }
    .mk:hover { color:var(--ink); border-color:var(--muted); }
    .mk.keep.on { background:var(--good-soft); color:var(--good); border-color:transparent; }
    .mk.reject.on { background:var(--mid-soft); color:var(--mid); border-color:transparent; }

    .rev-empty { text-align:center; color:var(--muted); padding:60px 16px; }
    .rev-empty h2 { color:var(--ink); font-family:Charter,Georgia,serif; margin-bottom:6px; }
    @media (max-width:560px) {
      .row { flex-wrap:wrap; }
      .mk .lbl { display:none; }
    }
  </style>
</head>
<body>
  <header class="toolbar">
    <div class="brand">Leadfinder</div>
    <span class="muted">Review</span>
    <div style="flex:1"></div>
    <select id="filter" class="ctl" aria-label="Filter">
      <option value="undecided">Undecided</option>
      <option value="all">All</option>
      <option value="keep">Kept</option>
      <option value="reject">Rejected</option>
    </select>
    <a class="btn ghost" href="/">Map</a>
    <button id="theme-btn" class="btn ghost icon" type="button" title="Toggle light/dark">&#9681;</button>
  </header>

  <div class="rev-progress">
    <div class="rev-counts">
      <span><strong id="c-keep">0</strong> kept</span>
      <span><strong id="c-reject">0</strong> rejected</span>
      <span><strong id="c-left">0</strong> to review</span>
    </div>
    <div class="progress"><span id="progress-fill" class="progress-fill"></span></div>
  </div>

  <div class="rev-sub">
    <span id="count" class="count"></span>
    <span class="hint">Click &#10003; to keep, &#10007; to reject &middot; click again to undo</span>
  </div>

  <main>
    <div id="list" class="rev-list"></div>
  </main>

  <script src="/review.js"></script>
</body>
</html>
