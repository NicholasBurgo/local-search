<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Leadfinder</title>
  <link rel="stylesheet" href="/leaflet.css">
  <link rel="stylesheet" href="/app.css">
</head>
<body>
  <header class="appbar">
    <a class="brand-block" href="/">
      <svg class="logo" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M12 2C7.9 2 4.6 5.3 4.6 9.4c0 5.3 6.4 11.6 6.7 11.9.4.4 1 .4 1.4 0 .3-.3 6.7-6.6 6.7-11.9C19.4 5.3 16.1 2 12 2z" fill="currentColor"/>
        <circle class="dot" cx="12" cy="9.4" r="2.6"/>
      </svg>
      <span class="brand">Leadfinder</span>
    </a>
    <nav class="appnav">
      <a class="navlink active" href="/">Map</a>
      <a class="navlink" href="/review">Pipeline</a>
    </nav>
    <div style="flex:1"></div>
    <div class="appbar-right">
      <button id="theme-btn" class="iconbtn" type="button" title="Toggle light/dark">&#9681;</button>
    </div>
  </header>

  <div class="toolbar">
    <div class="search">
      <input id="loc" type="search" autocomplete="off" spellcheck="false"
             placeholder="Search a location, e.g. Mandeville LA">
      <ul id="suggest" class="suggest" hidden></ul>
    </div>

    <label class="ctl radius-ctl">
      <span>Radius</span>
      <input id="radius" type="range" min="1" max="30" step="1" value="10">
      <span id="rlabel" class="mono">10 mi</span>
    </label>

    <select id="cat" class="ctl" aria-label="Category filter">
      <option value="">All categories</option>
    </select>

    <button id="search-btn" class="btn" type="button">Search</button>

    <span class="tb-sep"></span>

    <button id="verify-btn" class="btn ghost" type="button">Verify</button>
    <button id="reverify-btn" class="btn ghost" type="button" title="Re-probe every stored lead">Reverify</button>
    <button id="saved-btn" class="btn ghost" type="button" title="Load stored leads (no re-pull)">Saved</button>
    <button id="export-btn" class="btn ghost" type="button">Export</button>
  </div>

  <div id="banner" class="banner" hidden></div>

  <main class="workspace">
    <section class="map-pane">
      <div id="map"></div>
      <div id="overlay" class="overlay" hidden>
        <div class="spinner"></div>
        <span id="overlay-text">Searching...</span>
      </div>
    </section>

    <aside class="results">
      <div class="results-head">
        <div class="results-count"><strong id="result-count">No search yet</strong>
          <span id="result-sub" class="muted"></span></div>
        <div class="results-tools">
          <span id="progress-text" class="muted"></span>
          <label class="mini"><input type="checkbox" id="hide-done"> Hide listed</label>
        </div>
      </div>
      <div id="cards" class="cards">
        <div class="empty">Search a location to find local businesses with no website.</div>
      </div>
    </aside>
  </main>

  <script src="/leaflet.js"></script>
  <script src="/app.js"></script>
</body>
</html>
